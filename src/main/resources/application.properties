spring.application.name=api

# Configuración de la base de datos JPA básica
spring.jpa.show-sql=true

#Generación automática del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Configuracion jwt para la seguridad
# Leemos el secreto de las variables de entorno del sistema. Si no existe, usamos "defaultSecret..." de respaldo para desarrollo local.
jwt.secret=${JWT_SECRET:unSecretoPorDefectoMuyLargoParaDesarrolloLocal1234567890yotravez334455698848484484848}
jwt.expiration=600000

# Configuración de H2 Console para desarrollo local
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:gestioneventosdb
spring.datasource.username=sa
spring.datasource.password=admin1234
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.naming.physical-strategy= org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl