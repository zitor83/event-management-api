spring.application.name=api

# Configuración de la base de datos JPA básica
spring.jpa.show-sql=true

#Generación automática del esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Configuracion jwt para la seguridad
jwt.secret=secretKeyParaJWTUltraSecretoConMuchoCaracteresParaMayorSeguridadyNumerosRandomicos1234567890
jwt.expiration=600000